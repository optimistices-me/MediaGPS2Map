<!DOCTYPE html>
<html>
<head>
    <title>照片位置热图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/map.css') }}" />
</head>
<body>
    <div id="map">
        <div id="animationInfo" style="display:none;">
            时间: <span id="infoTime">--</span><br>
            地点: <span id="infoLocation">--</span>
        </div>
    </div>

    <div id="sidebar">
        <div>
            <div class="mode-toggle">
                <span class="mode-label">轨迹模式</span>
                <label class="switch">
                    <input type="checkbox" id="displayModeSwitch">
                    <span class="slider round"></span>
                </label>
                <span class="mode-label">热点图模式</span>
            </div>

            <h3 class="section-title">统计信息</h3>
            <p>文件数量: <span id="file-count">0</span></p>
            <p>时间范围: <span id="time-range">无</span></p>
            <p>常去位置:</p>
            <div id="freq-locations-box">
                <ul id="sample-locations"></ul>
            </div>

            <div class="switch-container">
                <label class="switch">
                    <input type="checkbox" id="lockTrackSwitch">
                    <span class="slider round"></span>
                </label>
                <span>锁定轨迹</span>
            </div>

            <div class="switch-container">
                <label class="switch">
                    <input type="checkbox" id="animationSwitch">
                    <span class="slider round"></span>
                </label>
                <span>显示轨迹移动</span>
            </div>

            <div class="section-box">
                <h3 class="section-title">轨迹控制</h3>
                <div class="speed-box">
                    <div class="speed-label">移动速度</div>
                    <div class="speed-tabs">
                        <input type="radio" name="speedMode" id="modeFPS" checked hidden>
                        <label class="speed-tab active" for="modeFPS">照片/秒</label>
                        <input type="radio" name="speedMode" id="modeRatio" hidden>
                        <label class="speed-tab" for="modeRatio">压缩比</label>
                    </div>
                    <div class="speed-panel" id="speed-fps">
                        <input type="range" id="animationSpeed" min="1" max="50" value="5">
                        <input type="number" id="animationSpeed-value" value="5" min="1" max="50"> 照片/秒
                    </div>
                    <div class="speed-panel" id="speed-ratio" style="display:none;">
                        <input type="number" id="animationRatio" value="3600" min="1"> 秒/动画秒
                    </div>
                </div>

                <div class="control-box-body" style="margin-top:8px;">
                    <button id="btnRewind" title="快退">⏪</button>
                    <button id="btnPlay" title="播放">▶️</button>
                    <button id="btnPause" title="暂停">⏸️</button>
                    <button id="btnForward" title="快进">⏩</button>
                    <button id="btnReset" title="重置">⏮️</button>
                    <div class="progress-row">
                        <span>进度条：</span>
                        <input type="range" id="animationTimeProgress" min="0" max="100" value="0">
                        <span id="progressLabel">0%</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="time-filter">
            <h3 class="section-title">时间选择模式</h3>
            <div class="switch-container">
                <label class="switch">
                    <input type="checkbox" id="dateModeSwitch">
                    <span class="slider round"></span>
                </label>
                <span id="mode-label">范围模式</span>
            </div>
            <div id="timeline-container" class="range-mode">
                <div id="timeline"></div>
                <div id="timeline-handle-start"></div>
                <div id="timeline-handle-end"></div>
            </div>
            <div class="time-input" id="range-date-picker">
                <input type="datetime-local" id="start-time" />
                <input type="datetime-local" id="end-time" />
            </div>
            <div class="time-input" id="single-date-picker" style="display: none;">
                <input type="date" id="single-date" />
            </div>
            <button class="reset-button" id="reset-time">重置起止时间</button>

            <div class="holiday-row">
                <div class="switch-container" style="margin:0;">
                    <label class="switch">
                        <input type="checkbox" id="holidaySwitch">
                        <span class="slider round"></span>
                    </label>
                    <span>节假日识别</span>
                </div>
                <div id="holiday-popover" class="popover" style="display:none;">
                    <div id="holiday-list"></div>
                </div>
            </div>
        </div>

        <div id="controls" style="display:none;">
            <h3 class="control-box-title">热点形状控制</h3>
            <p>Radius:
                <input type="range" id="radius" min="1" max="50" value="4" />
                <input type="number" id="radius-value" value="4" />
            </p>

            <p>Blur:
                <input type="range" id="blur" min="0" max="10" value="2" />
                <input type="number" id="blur-value" value="2" />
            </p>

            <p>Min Opacity:
                <input type="range" id="minOpacity" min="0" max="1" step="0.01" value="0.4" />
                <input type="number" id="minOpacity-value" value="0.4" step="0.01" />
            </p>

            <p>Gradient:
                <div class="gradient-color">
                    <label>Low Color:
                        <input type="color" id="lowColor" value="#0000ff" />
                        <input type="number" id="lowOpacity" value="0.9" min="0" max="1" step="0.01" />
                    </label>
                </div>

                <div class="gradient-color">
                    <label>Mid Color:
                        <input type="color" id="midColor" value="#ffff00" />
                        <input type="number" id="midOpacity" value="0.6" min="0" max="1" step="0.01" />
                    </label>
                </div>

                <div class="gradient-color">
                    <label>High Color:
                        <input type="color" id="highColor" value="#ff0000" />
                        <input type="number" id="highOpacity" value="0.2" min="0" max="1" step="0.01" />
                    </label>
                </div>
            </p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://unpkg.com/leaflet-arrowheads@1.3.1/src/leaflet-arrowheads.js"></script>

    <script src="{{ url_for('static', filename='js/geo_utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/heatmap.js') }}"></script>
    <script src="{{ url_for('static', filename='js/tracks.js') }}"></script>
    <script src="{{ url_for('static', filename='js/timeline.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
    <script src="{{ url_for('static', filename='js/holiday.js') }}"></script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
